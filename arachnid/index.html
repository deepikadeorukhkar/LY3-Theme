<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Arachnids</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4fbff;
overflow:hidden;
touch-action:none;
}

.screen{
display:none;
width:100vw;
height:100vh;
padding:20px;
}

.active{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:48px;
color:#5b4b8a;
margin-bottom:20px;
text-align:center;
}

h2{
font-size:34px;
color:#5b4b8a;
margin-bottom:20px;
text-align:center;
}

button{
padding:12px 24px;
border:none;
border-radius:12px;
background:#7ec8e3;
color:white;
font-size:20px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* ------------------
INTRO
------------------ */

#introScreen{
background:linear-gradient(
to bottom,
#dff6ff,
#ffffff
);
}

#logo{
width:220px;
max-width:80%;
margin-bottom:20px;
}

/* ------------------
PUZZLE SCREEN
------------------ */

#puzzleScreen{
background:#eefcff;
}

#puzzleContainer{
width:100%;
max-width:1100px;

display:flex;
justify-content:center;
align-items:center;
gap:30px;

margin-top:20px;
}

/* LEFT + RIGHT COLUMNS */

.pieceColumn{
width:130px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

gap:15px;
}

/* CENTRE PUZZLE BOARD */

#puzzleBoard{

width:420px;
height:280px;

display:grid;

grid-template-columns:
repeat(3,1fr);

grid-template-rows:
repeat(2,1fr);

border:5px solid #7ec8e3;

border-radius:20px;

background:white;

overflow:hidden;

box-shadow:
0 5px 15px rgba(0,0,0,0.15);

}

/* EMPTY SLOTS */

.slot{

border:2px dashed #bdbdbd;

position:relative;

background-image:
url('assets/spiderimage.png');

background-size:
300% 200%;

background-repeat:no-repeat;

opacity:0.25;

}

/* DRAG PIECES */

.puzzlePiece{

width:110px;
height:110px;

border-radius:14px;

background-image:
url('assets/spiderimage.png');

background-size:
300% 200%;

background-repeat:no-repeat;

cursor:pointer;

touch-action:none;

box-shadow:
0 4px 10px rgba(0,0,0,0.2);

transition:
transform .2s;

}

.puzzlePiece:active{
transform:scale(1.08);
}

/* ------------------
MAZE
------------------ */

#mazeScreen{
background:#f9fff4;
}

#mazeWrapper{

position:relative;

width:90vw;
max-width:700px;

}

#mazeImage{

width:100%;
display:block;

border-radius:20px;

}

#mazeSpider{

position:absolute;

width:60px;

left:20px;
top:20px;

cursor:pointer;

touch-action:none;

z-index:10;

}

#webGoal{

position:absolute;

width:80px;

right:15px;
bottom:15px;

}

/* ------------------
CELEBRATION
------------------ */

#celebrationScreen{

background:
linear-gradient(
to bottom,
#fff7cc,
#ffffff
);

}

#finalMessage{

font-size:48px;

font-weight:bold;

color:#ff8c42;

margin-bottom:20px;

text-align:center;

}

#emojiRow{

font-size:60px;

margin-bottom:20px;

}

/* ------------------
FEEDBACK
------------------ */

#feedback{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

font-size:90px;

display:none;

z-index:999;

}

/* ------------------
CONFETTI
------------------ */

#confetti{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

z-index:998;

}

/* ------------------
MOBILE
------------------ */

@media(max-width:900px){

#puzzleContainer{

flex-direction:column;

gap:15px;

}

.pieceColumn{

flex-direction:row;

width:auto;

}

#puzzleBoard{

width:90vw;
height:60vw;

max-width:420px;
max-height:280px;

}

.puzzlePiece{

width:90px;
height:90px;

}

}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div id="feedback"></div>

<!-- INTRO -->

<div id="introScreen" class="screen active">

<img
id="logo"
src="assets/innovine-logo.png"
alt="Innovine Logo">

<h1>Welcome!</h1>

<p style="
font-size:24px;
margin-top:10px;
text-align:center;
color:#5b4b8a;
">
Game 1: Complete the spider puzzle
</p>

<p style="
font-size:24px;
margin-top:15px;
text-align:center;
color:#5b4b8a;
">
Game 2: Help the spider find its way to the web
</p>

</div>>

<!-- PUZZLE -->

<div id="puzzleScreen" class="screen">

<h2>Game 1: Complete the spider puzzle</h2>

<div id="puzzleContainer">

<div
id="leftPieces"
class="pieceColumn">
</div>

<div id="puzzleBoard">

<div class="slot" data-slot="0"></div>
<div class="slot" data-slot="1"></div>
<div class="slot" data-slot="2"></div>

<div class="slot" data-slot="3"></div>
<div class="slot" data-slot="4"></div>
<div class="slot" data-slot="5"></div>

</div>

<div
id="rightPieces"
class="pieceColumn">
</div>

</div>

</div>

<!-- MAZE -->

<div id="mazeScreen" class="screen">

<h2>Game 2: Help the spider find its way to the web</h2>

<div id="mazeWrapper">

<img
id="mazeImage"
src="assets/maze-reference.png">

<img
id="mazeSpider"
src="assets/spiderimage.png">

<img
id="webGoal"
src="assets/web.png">

</div>

<button
id="restartMaze"
style="margin-top:20px;display:none;">
Try Again
</button>

</div>

<!-- CELEBRATION -->

<div
id="celebrationScreen"
class="screen">

<div id="emojiRow">
🎉 ⭐ 👏
</div>

<div id="finalMessage">
Great Job!
</div>

<button id="playAgain">
Play Again
</button>

</div>

<!-- AUDIO -->

<audio
id="bgMusic"
src="assets/background-music.mp3"
loop> </audio>

<audio
id="correctSound"
src="assets/correct.mp3"> </audio>

<audio
id="wrongSound"
src="assets/wrong.mp3"> </audio>

<script>

const introScreen =
document.getElementById(
"introScreen"
);

const puzzleScreen =
document.getElementById(
"puzzleScreen"
);

const mazeScreen =
document.getElementById(
"mazeScreen"
);

const celebrationScreen =
document.getElementById(
"celebrationScreen"
);

const leftPieces =
document.getElementById(
"leftPieces"
);

const rightPieces =
document.getElementById(
"rightPieces"
);

const puzzleBoard =
document.getElementById(
"puzzleBoard"
);

const feedback =
document.getElementById(
"feedback"
);

const bgMusic =
document.getElementById(
"bgMusic"
);

const correctSound =
document.getElementById(
"correctSound"
);

const wrongSound =
document.getElementById(
"wrongSound"
);

let completedPieces = 0;

function showScreen(screen){

document
.querySelectorAll(".screen")
.forEach(s=>{

s.classList.remove(
"active"
);

});

screen.classList.add(
"active"
);

}

function speak(text){

speechSynthesis.cancel();

const utterance =
new SpeechSynthesisUtterance(
text
);

utterance.rate = 0.9;

speechSynthesis.speak(
utterance
);

}

function showTick(){

feedback.innerHTML="✓";
feedback.style.color="green";
feedback.style.display="block";

setTimeout(()=>{

feedback.style.display="none";

},800);

}

function showCross(){

feedback.innerHTML="✗";
feedback.style.color="red";
feedback.style.display="block";

setTimeout(()=>{

feedback.style.display="none";

},800);

}

setTimeout(()=>{

showScreen(
puzzleScreen
);

speak(
"Welcome to Arachnids. Complete the spider puzzle."
);

},5000);
/* -----------------------
AUDIO HELPERS
----------------------- */

function playCorrect(){

correctSound.currentTime = 0;
correctSound.play();

}

function playWrong(){

wrongSound.currentTime = 0;
wrongSound.play();

}

/* -----------------------
START BACKGROUND MUSIC
----------------------- */

document.addEventListener(
"pointerdown",
()=>{

bgMusic.volume = 0.3;

bgMusic.play()
.catch(()=>{});

},
{once:true}
);

/* -----------------------
PUZZLE VARIABLES
----------------------- */

const slots =
document.querySelectorAll(
".slot"
);

let draggedPiece = null;

/* -----------------------
CREATE PUZZLE
----------------------- */

function createPuzzle(){

leftPieces.innerHTML = "";
rightPieces.innerHTML = "";

completedPieces = 0;

/* -----------------------
SET SLOT GUIDE IMAGE
----------------------- */

slots.forEach((slot,index)=>{

const col =
index % 3;

const row =
Math.floor(index / 3);

slot.style.backgroundPosition =
`${col * 50}% ${row * 100}%`;

slot.innerHTML = "";

});

/* -----------------------
CREATE 6 PIECES
----------------------- */

const pieceIndexes =
[0,1,2,3,4,5];

/* RANDOM ORDER */

pieceIndexes.sort(
()=>Math.random()-0.5
);

pieceIndexes.forEach(
(pieceNumber,index)=>{

const piece =
document.createElement(
"div"
);

piece.className =
"puzzlePiece";

piece.dataset.correct =
pieceNumber;

const col =
pieceNumber % 3;

const row =
Math.floor(
pieceNumber / 3
);

piece.style.backgroundPosition =
`${col * 50}% ${row * 100}%`;

/* STORE ORIGINAL POSITION */

piece.dataset.homeSide =
index < 3
? "left"
: "right";

/* ADD TO SIDE COLUMN */

if(index < 3){

leftPieces.appendChild(
piece
);

}else{

rightPieces.appendChild(
piece
);

}

/* ENABLE DRAGGING */

enablePuzzleDrag(
piece
);

});

}

/* -----------------------
DRAG SYSTEM
----------------------- */

function enablePuzzleDrag(
piece
){

piece.addEventListener(
"pointerdown",
startDrag
);

}

/* -----------------------
POINTER START
----------------------- */

function startDrag(e){

draggedPiece =
e.target;

draggedPiece.setPointerCapture(
e.pointerId
);

draggedPiece.style.position =
"fixed";

draggedPiece.style.zIndex =
"1000";

movePiece(e);

draggedPiece.addEventListener(
"pointermove",
movePiece
);

draggedPiece.addEventListener(
"pointerup",
dropPiece
);

}

/* -----------------------
MOVE PIECE
----------------------- */

function movePiece(e){

if(!draggedPiece) return;

draggedPiece.style.left =
(e.clientX - 55) + "px";

draggedPiece.style.top =
(e.clientY - 55) + "px";

}

/* -----------------------
INTRO -> CREATE PUZZLE
----------------------- */

setTimeout(()=>{

createPuzzle();

},5200);
/* -----------------------
DROP PIECE
----------------------- */

function dropPiece(e){

if(!draggedPiece) return;

let placed = false;

slots.forEach(slot=>{

if(placed) return;

/* SLOT ALREADY FILLED */

if(
slot.querySelector(
".puzzlePiece"
)
){
return;
}

const slotRect =
slot.getBoundingClientRect();

const pieceRect =
draggedPiece.getBoundingClientRect();

/* OVERLAP CHECK */

const overlap =

pieceRect.left <
slotRect.right

&&

pieceRect.right >
slotRect.left

&&

pieceRect.top <
slotRect.bottom

&&

pieceRect.bottom >
slotRect.top;

if(overlap){

const correctSlot =
parseInt(
slot.dataset.slot
);

const pieceNumber =
parseInt(
draggedPiece.dataset.correct
);

/* CORRECT PLACE */

if(
correctSlot ===
pieceNumber
){

snapPieceToSlot(
draggedPiece,
slot
);

placed = true;

}else{

wrongPlacement();

placed = true;

}

}

});

if(!placed){

returnPieceHome();

}

cleanupDrag();

}

/* -----------------------
SNAP TO SLOT
----------------------- */

function snapPieceToSlot(
piece,
slot
){

playCorrect();

showTick();

piece.style.position =
"absolute";

piece.style.left = "0";
piece.style.top = "0";

piece.style.width = "100%";
piece.style.height = "100%";

piece.style.margin = "0";

piece.style.cursor =
"default";

slot.appendChild(
piece
);

completedPieces++;

speak(
"Good job!"
);

if(
completedPieces === 6
){

setTimeout(()=>{

puzzleComplete();

},1000);

}

}

/* -----------------------
WRONG SLOT
----------------------- */

function wrongPlacement(){

playWrong();

showCross();

speak(
"Try again."
);

returnPieceHome();

}

/* -----------------------
RETURN TO SIDE COLUMN
----------------------- */

function returnPieceHome(){

draggedPiece.style.position =
"relative";

draggedPiece.style.left = "";
draggedPiece.style.top = "";

draggedPiece.style.width =
"110px";

draggedPiece.style.height =
"110px";

draggedPiece.style.zIndex =
"1";

if(
draggedPiece.dataset.homeSide
=== "left"
){

leftPieces.appendChild(
draggedPiece
);

}else{

rightPieces.appendChild(
draggedPiece
);

}

}

/* -----------------------
CLEANUP DRAG
----------------------- */

function cleanupDrag(){

if(!draggedPiece) return;

draggedPiece.removeEventListener(
"pointermove",
movePiece
);

draggedPiece.removeEventListener(
"pointerup",
dropPiece
);

draggedPiece = null;

}

/* -----------------------
PUZZLE COMPLETE
----------------------- */

function puzzleComplete(){

playCorrect();

showTick();

speak(
"Fantastic. You completed the spider puzzle."
);

const board =
document.getElementById(
"puzzleBoard"
);

board.style.transform =
"scale(1.05)";

board.style.transition =
"0.5s";

setTimeout(()=>{

showScreen(
mazeScreen
);

initialiseMaze();

speak(
"Now help the spider find its web."
);

},2000);

}

/* -----------------------
MAZE VARIABLES
----------------------- */

const mazeSpider =
document.getElementById(
"mazeSpider"
);

const webGoal =
document.getElementById(
"webGoal"
);

const mazeWrapper =
document.getElementById(
"mazeWrapper"
);

const restartMaze =
document.getElementById(
"restartMaze"
);

let mazeDragging =
false;

let startX = 20;
let startY = 20;

let currentX = 20;
let currentY = 20;

/* -----------------------
INITIALISE MAZE
----------------------- */

function initialiseMaze(){

mazeSpider.style.left =
startX + "px";

mazeSpider.style.top =
startY + "px";

mazeSpider.style.transform =
"rotate(0deg)";

mazeSpider.addEventListener(
"pointerdown",
startMazeDrag
);

}

/* -----------------------
START MAZE DRAG
----------------------- */

function startMazeDrag(e){

mazeDragging = true;

mazeSpider.setPointerCapture(
e.pointerId
);

mazeSpider.addEventListener(
"pointermove",
moveMazeSpider
);

mazeSpider.addEventListener(
"pointerup",
stopMazeDrag
);

}

/* -----------------------
STOP MAZE DRAG
----------------------- */

function stopMazeDrag(){

mazeDragging = false;

mazeSpider.removeEventListener(
"pointermove",
moveMazeSpider
);

mazeSpider.removeEventListener(
"pointerup",
stopMazeDrag
);

}

/* -----------------------
MOVE SPIDER
----------------------- */

function checkMaze(){

const spiderRect =
mazeSpider.getBoundingClientRect();

const webRect =
webGoal.getBoundingClientRect();

const reachedWeb =

spiderRect.right >
webRect.left + 20

&&

spiderRect.left <
webRect.right - 20

&&

spiderRect.bottom >
webRect.top + 20

&&

spiderRect.top <
webRect.bottom - 20;

if(reachedWeb){

mazeSuccess();

return;

}

const x =
parseInt(
mazeSpider.style.left
);

const y =
parseInt(
mazeSpider.style.top
);

const maxX =
mazeWrapper.clientWidth - 60;

const maxY =
mazeWrapper.clientHeight - 60;

/* Outer boundary */

if(

x < 10 ||
y < 10 ||
x > maxX ||
y > maxY

){

mazeFail();

return;

}

/* Internal maze walls
Approximation based on uploaded maze image */

if(

(x>120 && x<170 && y<140)

||

(x>180 && x<220 && y>80 && y<200)

||

(x>80 && x<200 && y>150 && y<180)

||

(x>260 && x<300 && y>120 && y<290)

||

(x>180 && x<320 && y>230 && y<260)

){

mazeFail();

}

}

/* -----------------------
MAZE FAIL
----------------------- */

function mazeFail(){

mazeDragging = false;

playWrong();

showCross();

restartMaze.style.display =
"inline-block";

mazeSpider.style.left =
startX + "px";

mazeSpider.style.top =
startY + "px";

mazeSpider.style.transform =
"rotate(0deg)";

currentX = startX;
currentY = startY;

speak(
"Oops. Try again."
);

}

/* -----------------------
RESTART BUTTON
----------------------- */

restartMaze.addEventListener(
"click",
()=>{

restartMaze.style.display =
"none";

mazeSpider.style.left =
startX + "px";

mazeSpider.style.top =
startY + "px";

mazeSpider.style.transform =
"rotate(0deg)";

currentX = startX;
currentY = startY;

speak(
"Help the spider find the web."
);

}
);

/* -----------------------
MAZE SUCCESS
----------------------- */

function mazeSuccess(){

mazeDragging = false;

playCorrect();

showTick();

speak(
"You helped the spider find its web."
);

setTimeout(()=>{

showCelebration();

},1500);

}

/* -----------------------
CELEBRATION
----------------------- */

const celebrationMessages = [

"You helped the spider find its web!",

"Great Job!",

"Excellent!",

"Fantastic Work!",

"Super Spider Helper!"

];;

function showCelebration(){

showScreen(
celebrationScreen
);

const chosenMessage =

celebrationMessages[
Math.floor(
Math.random() *
celebrationMessages.length
)
];

document.getElementById(
"finalMessage"
).innerHTML =
chosenMessage;

speak(
chosenMessage
);

startConfetti();

}

/* -----------------------
PLAY AGAIN
----------------------- */

document
.getElementById(
"playAgain"
)
.addEventListener(
"click",
()=>{

location.reload();

}
);

/* -----------------------
CONFETTI
----------------------- */

const confettiCanvas =
document.getElementById(
"confetti"
);

const confettiCtx =
confettiCanvas.getContext(
"2d"
);

function resizeConfetti(){

confettiCanvas.width =
window.innerWidth;

confettiCanvas.height =
window.innerHeight;

}

resizeConfetti();

window.addEventListener(
"resize",
resizeConfetti
);

const confettiPieces = [];

for(
let i=0;
i<180;
i++
){

confettiPieces.push({

x:
Math.random() *
window.innerWidth,

y:
Math.random() *
window.innerHeight,

size:
Math.random()*10 + 5,

speed:
Math.random()*3 + 1,

rotation:
Math.random()*360,

colour:

[
"#ff8fab",
"#ffd166",
"#90e0ef",
"#cdb4ff",
"#b8f2a5"
][
Math.floor(
Math.random()*5
)
]

});

}

function startConfetti(){

animateConfetti();

}

function animateConfetti(){

confettiCtx.clearRect(
0,
0,
confettiCanvas.width,
confettiCanvas.height
);

confettiPieces.forEach(
piece=>{

confettiCtx.save();

confettiCtx.translate(
piece.x,
piece.y
);

confettiCtx.rotate(
piece.rotation
);

confettiCtx.fillStyle =
piece.colour;

confettiCtx.fillRect(
0,
0,
piece.size,
piece.size
);

confettiCtx.restore();

piece.y += piece.speed;

if(
piece.y >
confettiCanvas.height
){

piece.y = -20;

}

});

requestAnimationFrame(
animateConfetti
);

}

/* -----------------------
START POSITIONS
----------------------- */

currentX = startX;
currentY = startY;

</script>

</body>
</html>
